<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSL Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f12;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    padding: 40px 24px;
  }
  .card {
    background: #16161a;
    border: 1px solid #2a2a35;
    border-radius: 16px;
    padding: 40px 32px 32px;
    max-width: 780px;
    width: 100%;
    box-shadow: 0 0 60px rgba(100,80,200,0.08);
  }
  .title {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555568;
    margin-bottom: 28px;
  }
  svg text { font-family: 'Courier New', monospace; }

  /* color ramps adapted for dark bg */
  .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #23232d; stroke: #3a3a4a; }
  .c-gray text { fill: #9a9aaa; }
  .c-purple rect, .c-purple circle { fill: #1e1a3a; stroke: #5a4ab0; }
  .c-purple text { fill: #a090e0; }
  .c-teal rect, .c-teal circle { fill: #0d2a22; stroke: #1a7a5a; }
  .c-teal text { fill: #50c8a0; }
  .c-coral rect, .c-coral circle { fill: #2a1510; stroke: #a04030; }
  .c-coral text { fill: #e07060; }
  text.th { font-weight: 600; font-size: 13px; fill: #c8c8d8; }
  text.ts { font-weight: 400; font-size: 11px; fill: #666678; }
  .arr { stroke: #3a3a4a; stroke-width: 1.5; fill: none; }
  .leader { stroke: #3a3a4a; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
</style>
</head>
<body>
<div class="card">
  <div class="title">Graph Structure Learning — System Architecture</div>
  <svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Row 1: Input -->
    <g class="c-gray">
      <rect x="40" y="60" width="140" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="110" y="83" text-anchor="middle">Node features</text>
      <text class="ts" x="110" y="101" text-anchor="middle">Noisy local observations</text>
    </g>

    <line x1="182" y1="88" x2="218" y2="88" class="arr" marker-end="url(#arrow)" stroke="#3a3a4a"/>

    <g class="c-purple">
      <rect x="220" y="60" width="180" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="310" y="83" text-anchor="middle">Graph structure learner</text>
      <text class="ts" x="310" y="101" text-anchor="middle">Learns sparse adjacency A</text>
    </g>

    <line x1="402" y1="88" x2="438" y2="88" class="arr" marker-end="url(#arrow)" stroke="#3a3a4a"/>

    <g class="c-teal">
      <rect x="440" y="60" width="200" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="540" y="83" text-anchor="middle">GNN aggregator</text>
      <text class="ts" x="540" y="101" text-anchor="middle">Message passing over learned A</text>
    </g>

    <line x1="540" y1="118" x2="540" y2="154" class="arr" marker-end="url(#arrow)" stroke="#3a3a4a"/>

    <g class="c-teal">
      <rect x="440" y="156" width="200" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="540" y="179" text-anchor="middle">Task head</text>
      <text class="ts" x="540" y="197" text-anchor="middle">Node / graph classification</text>
    </g>

    <line x1="540" y1="214" x2="540" y2="250" class="arr" marker-end="url(#arrow)" stroke="#3a3a4a"/>

    <g class="c-coral">
      <rect x="440" y="252" width="200" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="540" y="275" text-anchor="middle">Joint loss</text>
      <text class="ts" x="540" y="293" text-anchor="middle">Task loss + sparsity reg.</text>
    </g>

    <!-- Feedback arrow -->
    <path d="M540 308 L540 340 L310 340 L310 118" fill="none" stroke="#3a3a4a" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
    <text class="ts" x="430" y="358" text-anchor="middle">End-to-end gradient flow</text>

    <!-- Divider -->
    <line x1="40" y1="390" x2="640" y2="390" stroke="#2a2a35" stroke-width="0.5"/>

    <!-- Bottom row label -->
    <text class="th" x="40" y="418">Inside the graph structure learner</text>

    <g class="c-purple">
      <rect x="40" y="432" width="140" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="110" y="451" text-anchor="middle">Similarity metric</text>
      <text class="ts" x="110" y="466" text-anchor="middle">cosine / learned MLP</text>
    </g>

    <line x1="182" y1="454" x2="208" y2="454" class="arr" marker-end="url(#arrow)" stroke="#3a3a4a"/>

    <g class="c-purple">
      <rect x="210" y="432" width="140" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="280" y="451" text-anchor="middle">Sparsification</text>
      <text class="ts" x="280" y="466" text-anchor="middle">top-k or Gumbel-softmax</text>
    </g>

    <line x1="352" y1="454" x2="378" y2="454" class="arr" marker-end="url(#arrow)" stroke="#3a3a4a"/>

    <g class="c-purple">
      <rect x="380" y="432" width="140" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="450" y="451" text-anchor="middle">Differentiable A</text>
      <text class="ts" x="450" y="466" text-anchor="middle">soft adjacency matrix</text>
    </g>

    <line x1="522" y1="454" x2="548" y2="454" class="arr" marker-end="url(#arrow)" stroke="#3a3a4a"/>

    <g class="c-teal">
      <rect x="550" y="432" width="90" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="595" y="451" text-anchor="middle">→ GNN</text>
      <text class="ts" x="595" y="466" text-anchor="middle">feeds above</text>
    </g>
  </svg>
</div>
</body>
</html>
